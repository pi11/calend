{% extends "base.html" %}
{% block title %}{{ holiday }}. {{ holiday.next_date }} Календарь праздников. {% endblock %}
{% block main %}
<h1 class="title is-3">{{ holiday }} {{ holiday.next_date }}</h1>

{% if holiday.image %}
<figure class="image mb-4" style="max-width:500px;">
  <img src="{{ MEDIA_URL }}{{ holiday.image }}">
</figure>
{% endif %}

<div class="content">{{ holiday.description|safe }}</div>
{% endblock %}
